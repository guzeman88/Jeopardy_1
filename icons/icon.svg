<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1464b8"/>
      <stop offset="100%" stop-color="#071028"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#c8921a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect x="6" y="6" width="500" height="500" rx="88" fill="none" stroke="rgba(247,201,72,0.3)" stroke-width="5"/>

  <!-- Crisp J! centered -->
  <text x="256" y="256"
        font-family="Georgia,'Times New Roman',serif"
        font-size="280" font-weight="bold" font-style="italic"
        text-anchor="middle" dominant-baseline="central"
        fill="url(#gold)">J!</text>
</svg>
