<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1464b8"/>
      <stop offset="100%" stop-color="#071028"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="60%" stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#c8921a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>
  <!-- Inner glow border -->
  <rect x="6" y="6" width="500" height="500" rx="84" fill="none" stroke="rgba(247,201,72,0.35)" stroke-width="5"/>
  <!-- Subtle grid lines for board feel -->
  <line x1="170" y1="0" x2="170" y2="512" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="342" y1="0" x2="342" y2="512" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="180" x2="512" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="0" y1="332" x2="512" y2="332" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <!-- J! text -->
  <text x="256" y="360"
        font-family="Georgia,'Times New Roman',serif"
        font-size="300" font-weight="bold" font-style="italic"
        text-anchor="middle"
        fill="url(#gold)" filter="url(#glow)">J!</text>
  <!-- Bottom label -->
  <rect x="80" y="418" width="352" height="50" rx="8" fill="rgba(0,0,0,0.4)"/>
  <text x="256" y="451"
        font-family="-apple-system,'Segoe UI',Arial,sans-serif"
        font-size="26" font-weight="700" letter-spacing="4"
        text-anchor="middle" fill="rgba(255,255,255,0.85)">JEOPARDY!</text>
</svg>
